# Production override for docker-compose.yml
# This file overrides development settings for production deployment

version: '3.8'

services:
  api:
    restart: always
    # Single worker to reduce memory usage on small droplet
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      # Remove src volume mount for production (no hot-reload)

  dashboard:
    restart: always
    command: streamlit run src/ui/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      # Remove src volume mount for production (no hot-reload)

  ngrok:
    restart: always
    command:
      - "http"
      - "api:8000"
      - "--domain=uninflammable-nonlive-samuel.ngrok-free.dev"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN_PROD}

  webhook-setup:
    environment:
      - ENVIRONMENT=production

