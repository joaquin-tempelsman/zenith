# Nginx Configuration for Daily Pipeline
# Save this to: /etc/nginx/sites-available/daily-pipeline
# Then symlink to sites-enabled

server {
    # Listen on port 80 for both IPv4 and IPv6
    listen 80;
    listen [::]:80;

    # Server name (use your domain or droplet IP)
    server_name _;  # Accepts all hostnames

    # Root directory for static files
    root /var/www/daily-pipeline;
    index index.html;

    # Logging
    access_log /var/log/nginx/daily-pipeline-access.log;
    error_log /var/log/nginx/daily-pipeline-error.log;

    # Main location block
    location / {
        try_files $uri $uri/ =404;
        
        # Disable caching for development (remove in production)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Optional: Redirect www to non-www (uncomment if using a domain)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name www.yourdomain.com;
#     return 301 http://yourdomain.com$request_uri;
# }
