version: '3.8'

# Production Docker Compose Configuration
# Use this for deployment to Digital Ocean or other cloud VMs

services:
  # FastAPI Backend Service
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-inventory-system}:latest
    container_name: inventory-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=sqlite:///./data/inventory.db
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-inventory-system}
    volumes:
      - inventory-data:/app/data
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - inventory-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit Dashboard Service
  dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY:-inventory-system}:latest
    container_name: inventory-dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=sqlite:///./data/inventory.db
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-inventory-system}
    volumes:
      - inventory-data:/app/data
    command: streamlit run src/ui/dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    depends_on:
      api:
        condition: service_healthy
    networks:
      - inventory-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Webhook setup service for production
  webhook-setup:
    image: ghcr.io/${GITHUB_REPOSITORY:-inventory-system}:latest
    container_name: inventory-webhook-setup
    restart: "no"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - DOMAIN_NAME=${DOMAIN_NAME:-}
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
    command: python /app/scripts/setup-webhook-production.py
    depends_on:
      api:
        condition: service_healthy
    networks:
      - inventory-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: inventory-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
      - dashboard
    networks:
      - inventory-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  inventory-network:
    driver: bridge

volumes:
  inventory-data:
    driver: local

